<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="connect-src 'self' data: blob: https://ws.audioscrobbler.com;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pgbito webpage</title>

    <link rel="stylesheet" href="https://unpkg.com/7.css" />
    <!--<link rel="stylesheet" href="/js/win7.css" />-->

    <script type="module" src="./js/windower.js"></script>
    <script type="module" src="./js/main.js"></script>
    <style>
      body {
        position: absolute;
        margin: 0;
        padding: 0;
        top: 0;
        left: 0;
        overflow: hidden;
        user-select: none;
      }
      .unselectable {
        user-select: none;
        -moz-user-select: none;
        -khtml-user-select: none;
        -webkit-user-select: none;
        -o-user-select: none;
      }
      .draggable {
        position: absolute;
      }
      .winwin {
        width: 550px;
        max-width: 550px;
      }
      body {
        position: absolute;
        margin: 0;
        padding: 0;
        top: 0;
        left: 0;
        background-image: url("https://raw.githubusercontent.com/pgbito/pgbito.github.io/refs/heads/main/js/bak.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow: hidden;
        user-select: none;
      }
      .unselectable {
        user-select: none;
        -moz-user-select: none;
        -khtml-user-select: none;
        -webkit-user-select: none;
        -o-user-select: none;
      }
      .draggable {
        position: absolute;
      }
      .winwin {
        width: 550px;
        max-width: 550px;
      }

      /* === sobre mí window === */
      .about-content {
        flex-direction: column;
        padding: 6px 12px;
        max-width: 310px;
      }
      .about-title {
        color: #29c9e0;
        font-family: "Comic Sans MS", cursive, sans-serif;
        font-size: 3em;
        margin: 0 0 10px 0;
        text-shadow: 0 0 10px rgba(41, 201, 224, 0.45);
        letter-spacing: 0.5px;
      }
      .about-content p {
        font-size: 1.5em;
        line-height: 1.65;
        margin: 0 0 12px 0;
        color: #1a1a1a;
      }
      .about-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 4px;
        margin-bottom: 12px;
      }
      .about-tag {
        background: rgba(41, 201, 224, 0.12);
        border: 1px solid rgba(41, 201, 224, 0.45);
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 0.78em;
        color: #0097a7;
        cursor: default;
      }
      .about-more-btn {
        margin-top: 4px;
        width: 100%;
        font-size: 0.95em;
        cursor: pointer;
        letter-spacing: 0.3px;
      }

      /* === links & música window === */
      .links-content {
        flex-direction: column;
        padding: 10px 16px;
        width: 100%;
        box-sizing: border-box;
        align-self: stretch;
      }
      .links-section-title {
        font-size: 1em;
        font-weight: bold;
        margin: 4px 0 8px 0;
        color: #1a1a1a;
      }
      .links-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 4px;
      }
      .link-chip {
        background: rgba(41, 201, 224, 0.1);
        border: 1px solid rgba(41, 201, 224, 0.5);
        border-radius: 20px;
        padding: 5px 13px;
        font-size: 0.9em;
        color: #006e7f;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.15s;
      }
      .link-chip:hover {
        background: rgba(41, 201, 224, 0.28);
      }

      /* === scrobbles como iconos de escritorio === */
      #scrobbles-list {
        display: flex;
        flex-direction: row;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 10px;
        width: 100%;
        box-sizing: border-box;
        scrollbar-width: thin;
        scrollbar-color: #29c9e0 #e0e0e0;
      }
      #scrobbles-list::-webkit-scrollbar {
        height: 10px;
      }
      #scrobbles-list::-webkit-scrollbar-track {
        background: #e0e0e0;
        border-radius: 4px;
      }
      #scrobbles-list::-webkit-scrollbar-thumb {
        background: #29c9e0;
        border-radius: 4px;
      }
      #scrobbles-list::-webkit-scrollbar-thumb:hover {
        background: #00adc4;
      }

      /* cada iconito */
      .scrobble-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100px;
        flex-shrink: 0;
        cursor: default;
        padding: 7px 5px;
        border-radius: 6px;
        transition: background 0.12s;
      }
      .scrobble-icon:hover {
        background: rgba(41, 201, 224, 0.15);
      }
      .scrobble-icon.scrobble-nowplaying {
        background: rgba(41, 201, 224, 0.18);
        outline: 1px solid rgba(41, 201, 224, 0.5);
      }
      .scrobble-icon-img {
        width: 80px;
        height: 80px;
        border-radius: 6px;
        object-fit: cover;
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.2);
        margin-bottom: 7px;
      }
      .scrobble-icon-noimg {
        width: 80px;
        height: 80px;
        border-radius: 6px;
        background: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8em;
        color: #888;
        margin-bottom: 7px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }
      .scrobble-icon-name {
        font-size: 0.84em;
        font-weight: bold;
        color: #111;
        text-align: center;
        word-break: break-word;
        line-height: 1.3;
        max-height: 2.7em;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        width: 100%;
      }
      .scrobble-icon-artist {
        font-size: 0.74em;
        color: #555;
        text-align: center;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        width: 100%;
      }
      .scrobble-badge {
        font-size: 0.65em;
        background: #29c9e0;
        color: white;
        border-radius: 10px;
        padding: 2px 7px;
        margin-top: 4px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("https://raw.githubusercontent.com/pgbito/pgbito.github.io/refs/heads/main/js/login.png");
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity 0.8s ease;
      }
      /* estado "after" */
      body.active::before {
        opacity: 1;
      }
    </style>
  </head>
