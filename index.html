    <style>
      body {
        position: absolute;
        margin: 0;
        padding: 0;
        top: 0;
        left: 0;
        overflow: hidden;
        user-select: none;
      }
      .unselectable {
        user-select: none;
        -moz-user-select: none;
        -khtml-user-select: none;
        -webkit-user-select: none;
        -o-user-select: none;
      }
      .draggable {
        position: absolute;
      }
      .winwin {
        width: 550px;
        max-width: 550px;
      }
      body {
        position: absolute;
        margin: 0;
        padding: 0;
        top: 0;
        left: 0;
        background-image: url("https://raw.githubusercontent.com/pgbito/pgbito.github.io/refs/heads/main/js/login.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow: hidden;
        user-select: none;
      }
      .unselectable {
        user-select: none;
        -moz-user-select: none;
        -khtml-user-select: none;
        -webkit-user-select: none;
        -o-user-select: none;
      }
      .draggable {
        position: absolute;
      }
      .winwin {
        width: 550px;
        max-width: 550px;
      }

      /* === sobre mí window === */
      .about-content {
        flex-direction: column;
        padding: 6px 12px;
        max-width: 310px;
      }
      .about-title {
        color: #29c9e0;
        font-family: "Comic Sans MS", cursive, sans-serif;
        font-size: 3em;
        margin: 0 0 10px 0;
        text-shadow: 0 0 10px rgba(41, 201, 224, 0.45);
        letter-spacing: 0.5px;
      }
      .about-content p {
        font-size: 1.5em;
        line-height: 1.65;
        margin: 0 0 12px 0;
        color: #1a1a1a;
      }
      .about-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 4px;
        margin-bottom: 12px;
      }
      .about-tag {
        background: rgba(41, 201, 224, 0.12);
        border: 1px solid rgba(41, 201, 224, 0.45);
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 0.78em;
        color: #0097a7;
        cursor: default;
      }
      .about-more-btn {
        margin-top: 4px;
        width: 100%;
        font-size: 0.95em;
        cursor: pointer;
        letter-spacing: 0.3px;
      }

      /* === links & música window === */
      .links-content {
        flex-direction: column;
        padding: 10px 16px;
        width: 100%;
        box-sizing: border-box;
        align-self: stretch;
      }
      .links-section-title {
        font-size: 1em;
        font-weight: bold;
        margin: 4px 0 8px 0;
        color: #1a1a1a;
      }
      .links-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 4px;
      }
      .link-chip {
        background: rgba(41, 201, 224, 0.1);
        border: 1px solid rgba(41, 201, 224, 0.5);
        border-radius: 20px;
        padding: 5px 13px;
        font-size: 0.9em;
        color: #006e7f;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.15s;
      }
      .link-chip:hover {
        background: rgba(41, 201, 224, 0.28);
      }

      /* === scrobbles como iconos de escritorio === */
      #scrobbles-list {
        display: flex;
        flex-direction: row;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 10px;
        width: 100%;
        box-sizing: border-box;
        scrollbar-width: thin;
        scrollbar-color: #29c9e0 #e0e0e0;
      }
      #scrobbles-list::-webkit-scrollbar {
        height: 10px;
      }
      #scrobbles-list::-webkit-scrollbar-track {
        background: #e0e0e0;
        border-radius: 4px;
      }
      #scrobbles-list::-webkit-scrollbar-thumb {
        background: #29c9e0;
        border-radius: 4px;
      }
      #scrobbles-list::-webkit-scrollbar-thumb:hover {
        background: #00adc4;
      }

      /* cada iconito */
      .scrobble-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100px;
        flex-shrink: 0;
        cursor: default;
        padding: 7px 5px;
        border-radius: 6px;
        transition: background 0.12s;
      }
      .scrobble-icon:hover {
        background: rgba(41, 201, 224, 0.15);
      }
      .scrobble-icon.scrobble-nowplaying {
        background: rgba(41, 201, 224, 0.18);
        outline: 1px solid rgba(41, 201, 224, 0.5);
      }
      .scrobble-icon-img {
        width: 80px;
        height: 80px;
        border-radius: 6px;
        object-fit: cover;
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.2);
        margin-bottom: 7px;
      }
      .scrobble-icon-noimg {
        width: 80px;
        height: 80px;
        border-radius: 6px;
        background: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8em;
        color: #888;
        margin-bottom: 7px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }
      .scrobble-icon-name {
        font-size: 0.84em;
        font-weight: bold;
        color: #111;
        text-align: center;
        word-break: break-word;
        line-height: 1.3;
        max-height: 2.7em;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        width: 100%;
      }
      .scrobble-icon-artist {
        font-size: 0.74em;
        color: #555;
        text-align: center;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        width: 100%;
      }
      .scrobble-badge {
        font-size: 0.65em;
        background: #29c9e0;
        color: white;
        border-radius: 10px;
        padding: 2px 7px;
        margin-top: 4px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("https://raw.githubusercontent.com/pgbito/pgbito.github.io/refs/heads/main/js/bak.jpg");
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity 0.8s ease;
      }
      /* estado "after" */
      body.active::before {
        opacity: 1;
      }

      /* === responsive móvil/tablet === */
      @media (max-width: 1024px) {
        body {
          width: 100vw;
          height: 100vh;
        }
        .window.glass {
          max-width: calc(100vw - 12px) !important;
          box-sizing: border-box;
        }
        .window-body {
          max-width: calc(100vw - 12px) !important;
          min-width: unset !important;
          width: 100% !important;
          flex-wrap: wrap;
          overflow-x: hidden;
          overflow-y: auto;
          max-height: 82vh;
          box-sizing: border-box;
          padding: 10px !important;
          gap: 10px;
          align-items: flex-start !important;
        }
        .winwin {
          width: calc(100vw - 12px);
          max-width: calc(100vw - 12px);
        }
        /* about-content tamaño intermedio */
        .about-content {
          max-width: calc(100% - 140px);
          min-width: 180px;
          flex: 1;
          padding: 2px 10px;
        }
        .about-title {
          font-size: 1.7em;
          margin-bottom: 6px;
        }
        .about-content p {
          font-size: 1em;
          margin-bottom: 8px;
          line-height: 1.45;
        }
        /* links */
        .links-content {
          width: 100%;
          padding: 8px 10px;
        }
        .links-section-title {
          font-size: 1.1em !important;
        }
        /* scrobbles tamaño intermedio */
        .scrobble-icon {
          width: 80px;
        }
        .scrobble-icon-img,
        .scrobble-icon-noimg {
          width: 64px;
          height: 64px;
        }
      }
    </style>
  </head>
  <body>
    <div id="screen" class="has-scrollbar"></div>

    <!-- botón landscape/fullscreen solo en móvil -->
    <!-- ventanita de detección móvil -->
    <div id="mobile-detect-win" class="window glass active unselectable" style="
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 99999;
      width: 280px;
    ">
      <div class="title-bar">
        <div class="title-bar-text">📱 dispositivo detectado</div>
        <div class="title-bar-controls">
          <button aria-label="Close" onclick="document.getElementById('mobile-detect-win').style.display='none'"></button>
        </div>
      </div>
      <div class="window-body has-space" style="flex-direction: column; gap: 10px; padding: 12px;">
        <p style="margin: 0; font-size: 0.9em; line-height: 1.5;">se ha detectado un teléfono celular. para una mejor experiencia, se recomienda ver la página en pantalla completa.</p>
        <div style="display: flex; gap: 6px; justify-content: flex-end;">
          <button onclick="enterMobileMode()">⛶ pantalla completa</button>
          <button onclick="document.getElementById('mobile-detect-win').style.display='none'">cerrar</button>
        </div>
      </div>
    </div>

    <script>
      // bloquear zoom por pellizco (2+ dedos)
      document.addEventListener(
        "touchstart",
        function (e) {
          if (e.touches.length > 1) e.preventDefault();
        },
        { passive: false },
      );
      document.addEventListener(
        "touchmove",
        function (e) {
          if (e.touches.length > 1) e.preventDefault();
        },
        { passive: false },
      );

      // mostrar ventanita solo si es móvil/tablet
      function isMobile() {
        return window.innerWidth <= 1024 || "ontouchstart" in window;
      }
      if (isMobile()) {
        document.getElementById("mobile-detect-win").style.display = "block";
      }

      // recentrar el icono de pgbito y ventanas abiertas al cambiar tamaño
      function recentrarIcono() {
        // esperar un frame pa que el browser actualice innerWidth/innerHeight
        requestAnimationFrame(() => {
          const cx = window.innerWidth / 2;
          const cy = window.innerHeight / 2;
          // buscar el ProfilePicture por su id (win-pgbito)
          const iconEl = document.getElementById('win-pgbito ');
          if (iconEl) {
            iconEl.style.left = cx + 'px';
            iconEl.style.top = cy + 'px';
          }
        });
      }

      // entrar en landscape + fullscreen
      async function enterMobileMode() {
        document.getElementById("mobile-detect-win").style.display = "none";
        try {
          const el = document.documentElement;
          if (el.requestFullscreen) await el.requestFullscreen();
          else if (el.webkitRequestFullscreen)
            await el.webkitRequestFullscreen();
        } catch (e) {
          console.warn("fullscreen no disponible:", e);
        }
        try {
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock("landscape");
          }
        } catch (e) {
          console.warn("orientation lock no disponible:", e);
        }
        // esperar a que la orientacion y el fullscreen terminen de acomodarse
        setTimeout(recentrarIcono, 300);
      }

      // tambien recentrar si cambia el tamaño de ventana en general
      window.addEventListener('resize', recentrarIcono);

      // si salen de fullscreen, volver a mostrar la ventanita
      document.addEventListener("fullscreenchange", function () {
        if (!document.fullscreenElement && isMobile()) {
          document.getElementById("mobile-detect-win").style.display = "block";
        }
      });
    </script>
